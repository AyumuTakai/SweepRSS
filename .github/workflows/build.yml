name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── macOS ────────────────────────────────────────────────────────────────
  build-macos:
    name: Build (macOS DMG)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install Fastforge
        run: dart pub global activate fastforge

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Package DMG with Fastforge
        run: dart pub global run fastforge package --platform macos --targets dmg
        env:
          CODE_SIGN_IDENTITY: ""
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SweepRSS-macos
          path: dist/**/*.dmg
          retention-days: 7

  # ── Windows ──────────────────────────────────────────────────────────────
  build-windows:
    name: Build (Windows EXE)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install NSIS
        run: choco install nsis -y

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Fastforge
        run: dart pub global activate fastforge

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Package EXE with Fastforge
        run: dart pub global run fastforge package --platform windows --targets exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SweepRSS-windows
          path: dist/**/*.exe
          retention-days: 7

  # ── Linux ────────────────────────────────────────────────────────────────
  build-linux:
    name: Build (Linux AppImage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev \
            libwebkit2gtk-4.1-dev \
            libfuse2

      - name: Install appimagetool
        run: |
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O appimagetool
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/appimagetool

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Fastforge
        run: dart pub global activate fastforge

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Package AppImage with Fastforge
        run: dart pub global run fastforge package --platform linux --targets appimage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SweepRSS-linux
          path: dist/**/*.AppImage
          retention-days: 7
