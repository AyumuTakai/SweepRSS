name: rssreader
description: "SweepRSS - cross-platform RSS reader"
publish_to: 'none'

version: 0.3.1+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状態管理
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # データベース
  drift: ^2.21.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.24

  # RSS / HTTP
  webfeed_plus: ^1.0.0
  dio: ^5.7.0

  # HTML 表示
  flutter_inappwebview: ^6.1.5

  # ファイル操作
  file_picker: ^8.0.0
  path_provider: ^2.1.5
  share_plus: ^7.2.0

  # ユーティリティ
  path: ^1.9.1
  xml: ^6.5.0
  intl: ^0.20.0
  uuid: ^4.5.1
  url_launcher: ^6.3.1

dependency_overrides:
  intl: ^0.20.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.21.0
  build_runner: ^2.4.14
  riverpod_generator: ^4.0.0+1
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0
flutter:
  uses-material-design: true
  generate: true
