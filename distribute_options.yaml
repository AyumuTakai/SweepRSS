output: dist/
releases:
  - name: production
    jobs:
      # ── macOS ──────────────────────────────────────────────────────────────
      - name: release-macos-dmg
        package:
          platform: macos
          target: dmg

      # ── Windows ────────────────────────────────────────────────────────────
      - name: release-windows-exe
        package:
          platform: windows
          target: exe

      # ── Linux ──────────────────────────────────────────────────────────────
      - name: release-linux-appimage
        package:
          platform: linux
          target: appimage
