output: dist/
releases:
  - name: production
    jobs:
      # ── macOS ──────────────────────────────────────────────────────────────
      - name: release-macos-dmg
        package:
          platform: macos
          target: dmg

      # ── Windows ────────────────────────────────────────────────────────────
      - name: release-windows-msix
        package:
          platform: windows
          target: msix

      # ── Linux ──────────────────────────────────────────────────────────────
      - name: release-linux-appimage
        package:
          platform: linux
          target: appimage
